name: Send Update Mail

on:
  workflow_call:
    inputs:
      subject:
        required: true
        type: string
      summary:
        required: true
        type: string
      previous_updated_at:
        required: false
        type: string
        default: ""
      current_updated_at:
        required: false
        type: string
        default: ""
      commit_sha:
        required: false
        type: string
        default: ""
    secrets:
      SMTP_SERVER:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      MAIL_TO:
        required: true
      MAIL_FROM:
        required: true
      MAIL_ENABLED:
        required: false

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      MAIL_ENABLED: ${{ secrets.MAIL_ENABLED }}
    steps:
      - name: Build mail body
        id: build_body
        shell: bash
        run: |
          {
            printf '%s\n\n' "${{ inputs.summary }}"
            printf 'Repository: %s\n' "${{ github.repository }}"
            printf 'Workflow: %s\n' "${{ github.workflow }}"
            printf 'Run: %s/%s/actions/runs/%s\n' "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
            printf 'Previous updated_at: %s\n' "${{ inputs.previous_updated_at }}"
            printf 'Current updated_at: %s\n' "${{ inputs.current_updated_at }}"

            if [ -n "${{ inputs.commit_sha }}" ]; then
              printf 'Commit: %s/%s/commit/%s\n' "${{ github.server_url }}" "${{ github.repository }}" "${{ inputs.commit_sha }}"
            else
              printf 'Commit: not applicable for test notification\n'
            fi
          } > mail-body.txt

          {
            echo "body<<__MAIL_BODY__"
            cat mail-body.txt
            echo "__MAIL_BODY__"
          } >> "$GITHUB_OUTPUT"

      - name: Send notification mail
        if: env.MAIL_ENABLED == 'true'
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: ${{ inputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          body: ${{ steps.build_body.outputs.body }}
