# .github/workflows/conditional-sync.yml
name: Conditional Sync Zengin Data

on:
  schedule:
    - cron: '0 16 * * *'   # 毎日16:00 UTC → 翌日 1:00 JST
  workflow_dispatch:
    inputs:
      send_test_mail:
        description: Send a test email even when no data update is found
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.check_update.outputs.updated }}
      send_test_mail: ${{ steps.notify_mode.outputs.send_test_mail }}
      previous_updated_at: ${{ steps.check_update.outputs.previous_updated_at }}
      current_updated_at: ${{ steps.check_update.outputs.current_updated_at }}
      commit_sha: ${{ steps.sync_data.outputs.commit_sha }}
    steps:
      - name: Checkout mirror repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fetch remote updated_at
        run: |
          curl -sSL \
            https://raw.githubusercontent.com/zengin-code/source-data/master/data/updated_at \
            -o remote_updated_at

      - name: Read local updated_at
        run: |
          if [ -f data/updated_at ]; then
            cp data/updated_at local_updated_at
          else
            echo "1970-01-01T00:00:00Z" > local_updated_at
          fi

      - name: Check whether update exists
        id: check_update
        run: |
          if cmp -s remote_updated_at local_updated_at; then
            echo "No update since $(cat local_updated_at). Skipping."
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "Detected update $(cat remote_updated_at)."
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

          echo "previous_updated_at=$(cat local_updated_at)" >> "$GITHUB_OUTPUT"
          echo "current_updated_at=$(cat remote_updated_at)" >> "$GITHUB_OUTPUT"

      - name: Determine notification mode
        id: notify_mode
        env:
          SEND_TEST_MAIL: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_mail || false }}
        run: |
          echo "send_test_mail=${SEND_TEST_MAIL}" >> "$GITHUB_OUTPUT"

      - name: Sync data when updated
        id: sync_data
        if: steps.check_update.outputs.updated == 'true'
        run: |
          echo "Syncing full data to $(cat remote_updated_at)..."
          git clone --depth 1 \
            https://github.com/zengin-code/source-data.git tmp-src
          rm -rf data
          mv tmp-src/data ./data
          rm -rf tmp-src
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "sync: updated to $(cat data/updated_at)"
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push

  notify:
    needs: sync
    if: needs.sync.outputs.updated == 'true' || needs.sync.outputs.send_test_mail == 'true'
    uses: ./.github/workflows/send-update-mail.yml
    with:
      subject: ${{ needs.sync.outputs.updated == 'true' && format('zengin-data-mirror updated to {0}', needs.sync.outputs.current_updated_at) || 'zengin-data-mirror test notification' }}
      summary: ${{ needs.sync.outputs.updated == 'true' && 'zengin-data-mirror was updated successfully.' || 'This is a manual test notification from zengin-data-mirror.' }}
      previous_updated_at: ${{ needs.sync.outputs.previous_updated_at }}
      current_updated_at: ${{ needs.sync.outputs.current_updated_at }}
      commit_sha: ${{ needs.sync.outputs.commit_sha }}
    secrets:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      MAIL_ENABLED: ${{ secrets.MAIL_ENABLED }}
